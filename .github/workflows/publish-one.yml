name: Publish one dialect package

on:
  workflow_dispatch:
    inputs:
      package:
        description: Dialect package directory name
        required: true
        type: choice
        options:
          - sqlrules-postgresql
          - sqlrules-sqlite
      max_attempts:
        description: Upload attempts before giving up
        required: false
        default: "12"
      retry_seconds:
        description: Seconds between failed attempts
        required: false
        default: "1800"

permissions:
  contents: read

jobs:
  publish-one:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Retry upload until PyPI accepts the new project
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          PKG: ${{ inputs.package }}
          MAX_ATTEMPTS: ${{ inputs.max_attempts }}
          RETRY: ${{ inputs.retry_seconds }}
        run: |
          set -euo pipefail
          stem="${PKG//-/_}"
          code=$(curl -sS -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${PKG}/json" || true)
          if [[ "$code" == "200" ]]; then
            echo "${PKG} already on PyPI"
            mkdir -p dist-one
            python -m build "packages/${PKG}" --outdir dist-one
            twine upload --skip-existing dist-one/${stem}-*
            exit 0
          fi
          mkdir -p dist-one
          python -m build "packages/${PKG}" --outdir dist-one
          attempt=1
          while (( attempt <= MAX_ATTEMPTS )); do
            echo "Attempt ${attempt}/${MAX_ATTEMPTS} uploading ${PKG}..."
            if twine upload --skip-existing dist-one/${stem}-*; then
              curl -sS -f "https://pypi.org/pypi/${PKG}/1.0.0/json" >/dev/null
              echo "OK ${PKG}==1.0.0"
              exit 0
            fi
            echo "Upload failed (likely PyPI new-project 429). Sleeping ${RETRY}s..."
            sleep "${RETRY}"
            attempt=$((attempt + 1))
          done
          echo "Exhausted attempts for ${PKG}"
          exit 1
