name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e packages/sqlrules-postgresql -e packages/sqlrules-sqlite \
            -e packages/sqlrules-mysql -e packages/sqlrules-mssql

      - name: Ruff
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy src/sqlrules

      - name: Version sync
        run: |
          python - <<'PY'
          import re
          import tomllib
          from pathlib import Path

          def init_version(path: Path) -> str:
              text = path.read_text()
              marker = '__version__ = "'
              start = text.index(marker) + len(marker)
              end = text.index('"', start)
              return text[start:end]

          core = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          assert core == init_version(Path("src/sqlrules/__init__.py")), core
          print(f"core version ok: {core}")

          for pkg in (
              "sqlrules-postgresql",
              "sqlrules-sqlite",
              "sqlrules-mysql",
              "sqlrules-mssql",
          ):
              root = Path("packages") / pkg
              meta = tomllib.loads((root / "pyproject.toml").read_text())["project"]
              version = meta["version"]
              init = next((root / "src").rglob("__init__.py"))
              assert version == init_version(init), (pkg, version)
              deps = " ".join(meta["dependencies"])
              assert re.search(r"sqlrules>=0\.\d+,<0\.\d+", deps) or re.search(
                  r"sqlrules>=1,<2", deps
              ), (pkg, deps)
              assert (root / "LICENSE").is_file(), pkg
              assert list((root / "src").rglob("py.typed")), pkg
              print(f"{pkg} version/packaging ok: {version}")
          PY

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e packages/sqlrules-postgresql -e packages/sqlrules-sqlite \
            -e packages/sqlrules-mysql -e packages/sqlrules-mssql

      - name: Tests
        run: >
          pytest tests
          packages/sqlrules-postgresql/tests
          packages/sqlrules-sqlite/tests
          packages/sqlrules-mysql/tests
          packages/sqlrules-mssql/tests

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build core
        run: python -m build

      - name: Twine check core
        run: twine check dist/*

      - name: Build dialect plugins
        run: |
          python -m build packages/sqlrules-postgresql --outdir dist-plugins
          python -m build packages/sqlrules-sqlite --outdir dist-plugins
          python -m build packages/sqlrules-mysql --outdir dist-plugins
          python -m build packages/sqlrules-mssql --outdir dist-plugins
          twine check dist-plugins/*

      - name: Install wheel and import
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          import sqlrules
          from sqlrules import (
              compile,
              where,
              flatten,
              Compiler,
              PLUGIN_API_VERSION,
              pattern_text,
              TranslatorRegistry,
              default_registry,
          )

          assert sqlrules.__version__
          assert callable(compile)
          assert callable(where)
          assert callable(flatten)
          assert callable(pattern_text)
          assert Compiler is not None
          assert TranslatorRegistry is not None
          assert callable(default_registry)
          assert PLUGIN_API_VERSION == "1"
          print("wheel import ok:", sqlrules.__version__)
          PY

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Sphinx
        run: sphinx-build -W -b html docs docs/_build/html
