name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e packages/sqlrules-postgresql -e packages/sqlrules-sqlite

      - name: Ruff
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy src/sqlrules

      - name: Version sync
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          pkg_version = pyproject["project"]["version"]
          init = Path("src/sqlrules/__init__.py").read_text()
          marker = '__version__ = "'
          start = init.index(marker) + len(marker)
          end = init.index('"', start)
          init_version = init[start:end]
          assert pkg_version == init_version, (pkg_version, init_version)
          print(f"version ok: {pkg_version}")
          PY

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e packages/sqlrules-postgresql -e packages/sqlrules-sqlite

      - name: Tests
        run: pytest tests packages/sqlrules-postgresql/tests packages/sqlrules-sqlite/tests

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build core
        run: python -m build

      - name: Twine check core
        run: twine check dist/*

      - name: Build dialect plugins
        run: |
          python -m build packages/sqlrules-postgresql --outdir dist-plugins
          python -m build packages/sqlrules-sqlite --outdir dist-plugins
          twine check dist-plugins/*

      - name: Install wheel and import
        run: |
          python -m pip install dist/*.whl
          python - <<'PY'
          import sqlrules
          from sqlrules import compile, where, flatten, Compiler, PLUGIN_API_VERSION

          assert sqlrules.__version__
          assert callable(compile)
          assert callable(where)
          assert callable(flatten)
          assert Compiler is not None
          assert PLUGIN_API_VERSION == "1"
          print("wheel import ok:", sqlrules.__version__)
          PY
