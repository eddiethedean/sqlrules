name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e packages/sqlrules-postgresql -e packages/sqlrules-sqlite \
            -e packages/sqlrules-mysql -e packages/sqlrules-mssql

      - name: Ruff
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: |
          mypy src/sqlrules
          mypy --disable-error-code=redundant-cast \
            packages/sqlrules-postgresql/src packages/sqlrules-sqlite/src \
            packages/sqlrules-mysql/src packages/sqlrules-mssql/src

      - name: Version sync
        run: python scripts/check_versions.py

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -e packages/sqlrules-postgresql -e packages/sqlrules-sqlite \
            -e packages/sqlrules-mysql -e packages/sqlrules-mssql

      - name: Tests
        run: >
          pytest tests
          packages/sqlrules-postgresql/tests
          packages/sqlrules-sqlite/tests
          packages/sqlrules-mysql/tests
          packages/sqlrules-mssql/tests

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build core
        run: python -m build

      - name: Twine check core
        run: twine check dist/*

      - name: Build dialect plugins
        run: |
          python -m build packages/sqlrules-postgresql --outdir dist-plugins
          python -m build packages/sqlrules-sqlite --outdir dist-plugins
          python -m build packages/sqlrules-mysql --outdir dist-plugins
          python -m build packages/sqlrules-mssql --outdir dist-plugins
          twine check dist-plugins/*

      - name: Install wheel and import
        run: |
          python -m pip install dist/*.whl dist-plugins/*.whl
          python - <<'PY'
          from typing import Annotated

          from pydantic import BaseModel, Field
          from sqlalchemy import Column, MetaData, String, Table

          import sqlrules
          from sqlrules import (
              compile,
              where,
              flatten,
              Compiler,
              PLUGIN_API_VERSION,
              clear_model_cache,
              pattern_text,
              TranslatorRegistry,
              default_registry,
          )
          from sqlrules.conformance import run_basic_conformance
          from sqlrules_postgresql import PostgresPlugin
          from sqlrules_sqlite import SQLitePlugin
          from sqlrules_mysql import MysqlPlugin
          from sqlrules_mssql import MssqlPlugin

          assert sqlrules.__version__
          assert callable(compile)
          assert callable(where)
          assert callable(flatten)
          assert callable(clear_model_cache)
          assert callable(pattern_text)
          assert Compiler is not None
          assert TranslatorRegistry is not None
          assert callable(default_registry)
          assert PLUGIN_API_VERSION == "1"

          class LengthFilter(BaseModel):
              name: Annotated[str, Field(min_length=2)]

          length_table = Table("items", MetaData(), Column("name", String))
          for plugin, operator, model, table in (
              (PostgresPlugin(), "pattern", None, None),
              (SQLitePlugin(), "pattern", None, None),
              (MysqlPlugin(), "pattern", None, None),
              (MssqlPlugin(), "min_length", LengthFilter, length_table),
          ):
              run_basic_conformance(plugin, operator=operator, model=model, table=table)
          print("wheel import ok:", sqlrules.__version__)
          PY

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Sphinx
        run: sphinx-build -W -b html docs docs/_build/html
