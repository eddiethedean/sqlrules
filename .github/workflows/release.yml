name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  ci:
    name: Commit checks
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish core and plugins to PyPI
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify versions
        run: |
          python scripts/check_versions.py
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          assert tag.startswith("v"), tag
          expected = tag[1:]
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          assert version == expected, (version, expected)
          print(f"tag/version ok: {tag} -> {version}")
          PY

      - name: Build all distributions
        run: |
          mkdir -p dist-all
          python -m build --outdir dist-all
          for pkg in sqlrules-postgresql sqlrules-sqlite sqlrules-mysql sqlrules-mssql; do
            python -m build "packages/${pkg}" --outdir dist-all
          done
          twine check dist-all/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-all/
          # Prefer API token when present (creates new dialect projects on first
          # upload). OIDC Trusted Publishing also works once each project has a
          # publisher configured; omit password then and rely on id-token.
          password: ${{ secrets.PYPI_API_TOKEN }}
