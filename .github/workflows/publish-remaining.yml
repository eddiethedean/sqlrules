name: Publish remaining dialect packages

# Recovery when PyPI rate-limits new project creation mid-release, or when
# only wheels landed and sdists still need uploading.
on:
  workflow_dispatch:
    inputs:
      delay_seconds:
        description: Seconds to wait before each new-project upload
        required: false
        default: "2700"

permissions:
  contents: read

jobs:
  upload-sdists:
    name: Upload missing sdists for existing projects
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Build and upload sdists
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist-all
          python -m build --outdir dist-all
          python -m build packages/sqlrules-mysql --outdir dist-all
          python -m build packages/sqlrules-mssql --outdir dist-all
          twine upload --skip-existing \
            dist-all/sqlrules-1.0.0.tar.gz \
            dist-all/sqlrules_mysql-1.0.0.tar.gz \
            dist-all/sqlrules_mssql-1.0.0.tar.gz

  upload-postgresql:
    name: Create sqlrules-postgresql
    needs: upload-sdists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Wait then upload postgresql
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          DELAY: ${{ inputs.delay_seconds }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" https://pypi.org/pypi/sqlrules-postgresql/json || true)
          if [[ "$code" == "200" ]]; then
            echo "sqlrules-postgresql already exists"
            mkdir -p dist-all
            python -m build packages/sqlrules-postgresql --outdir dist-all
            twine upload --skip-existing dist-all/sqlrules_postgresql-*
            exit 0
          fi
          echo "Waiting ${DELAY}s for PyPI new-project rate limit..."
          sleep "${DELAY}"
          mkdir -p dist-all
          python -m build packages/sqlrules-postgresql --outdir dist-all
          twine upload --skip-existing dist-all/sqlrules_postgresql-*
          curl -sS -f https://pypi.org/pypi/sqlrules-postgresql/1.0.0/json >/dev/null
          echo "OK sqlrules-postgresql==1.0.0"

  upload-sqlite:
    name: Create sqlrules-sqlite
    needs: upload-postgresql
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Wait then upload sqlite
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
          DELAY: ${{ inputs.delay_seconds }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" https://pypi.org/pypi/sqlrules-sqlite/json || true)
          if [[ "$code" == "200" ]]; then
            echo "sqlrules-sqlite already exists"
            mkdir -p dist-all
            python -m build packages/sqlrules-sqlite --outdir dist-all
            twine upload --skip-existing dist-all/sqlrules_sqlite-*
            exit 0
          fi
          echo "Waiting ${DELAY}s for PyPI new-project rate limit..."
          sleep "${DELAY}"
          mkdir -p dist-all
          python -m build packages/sqlrules-sqlite --outdir dist-all
          twine upload --skip-existing dist-all/sqlrules_sqlite-*
          curl -sS -f https://pypi.org/pypi/sqlrules-sqlite/1.0.0/json >/dev/null
          echo "OK sqlrules-sqlite==1.0.0"

  verify:
    name: Verify all five packages
    needs: [upload-sdists, upload-postgresql, upload-sqlite]
    runs-on: ubuntu-latest
    steps:
      - name: Check PyPI
        run: |
          set -euo pipefail
          for pkg in sqlrules sqlrules-postgresql sqlrules-sqlite sqlrules-mysql sqlrules-mssql; do
            curl -sS -f "https://pypi.org/pypi/${pkg}/1.0.0/json" >/dev/null
            echo "OK ${pkg}==1.0.0"
          done
